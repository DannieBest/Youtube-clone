<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MY YOUTUBE</title>
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
  </head>
  <body>
    <!-- header -->
    <header>
      <div class="header__left">
        <button class="sidebar-toggle" aria-label="Toggle sidebar">
          <i class="material-icons">menu</i>
        </button>
        <a href="#home" class="youtube-link"
          ><img src="src/icons/youtube-image.png" alt="Youtube-clonelogo"
        /></a>
      </div>
      <div class="header__center">
        <form class="header__search-form">
          <input
            class="header__search-input"
            type="search"
            placeholder="Search"
          />
          <button type="submit" class="header__search-button" aria-label="Search">
            <i class="material-icons">search</i>
          </button>
        </form>
        <button class="voice-search-button" aria-label="Voice search">
          <i class="material-icons">mic</i>
        </button>
      </div>
      <div class="header__right">
        <button class="create-button" aria-label="Create">
          <i class="material-icons">add</i>
          <span>create</span>
        </button>
        <button class="notification-button" aria-label="Notifications">
          <i class="material-icons">notifications</i>
        </button>
        <button class="profile-button" aria-label="Profile">
          <i class="material-icons">account_circle</i>
        </button>
      </div>
    </header>

    <div class="page-container">
      <!-- sidebar -->
      <aside>
        <nav class="sidebar">
          <section>
            <a href="#home" class="sidebar-link">
              <i class="material-icons">home</i>
              <span>Home</span>
            </a>
            <a href="#" class="sidebar-link">
              <i class="material-icons">local_fire_department</i>
              <span>Shorts</span>
            </a>
          </section>
          
        </nav>
      </aside>
      <!-- main content -->
      <main></main>
    </div>
  </body>
</html>
